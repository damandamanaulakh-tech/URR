# Render Blueprint — deploy Sourceborn as a private web service.
# In Render: New + -> Blueprint -> pick this repo. It reads this file and deploys.
services:
  - type: web
    name: sourceborn
    runtime: python
    plan: free
    # Engine core is stdlib-only, so no build step is required.
    buildCommand: ""
    startCommand: "python app.py"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Add these in the Render dashboard (sync:false = secret, never committed).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
      # Brain + corpus live on the persistent disk below, never in git.
      - key: SB_ROOT
        value: /var/sourceborn/brain
      - key: SB_INGEST_CORPUS
        value: /var/sourceborn/corpus
    # Persistent disk: your private mind survives deploys and stays off GitHub.
    disk:
      name: sourceborn-brain
      mountPath: /var/sourceborn
      sizeGB: 1
