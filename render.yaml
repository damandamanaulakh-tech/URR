# Render Blueprint — deploy Sourceborn as a private web service.
# In Render: New + -> Blueprint -> pick this repo. It reads this file and deploys.
services:
  - type: web
    name: sourceborn
    runtime: python
    plan: free
    # Engine core is stdlib-only, so no build step is required.
    buildCommand: ""
    startCommand: "python app.py"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Offline by default (rule-based). Add your key in the Render dashboard to
      # switch on real Claude reasoning — do NOT commit the key.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
    # Optional: persist the private brain across deploys (Render disks are paid).
    # disk:
    #   name: sourceborn-brain
    #   mountPath: /opt/render/project/src/.sourceborn
    #   sizeGB: 1
